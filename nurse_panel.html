<!DOCTYPE html>

    <main class="content">
        <h1 class="page-title">Patients Summary</h1>

            <!-- card 3 -->
            <div class="course-card">

                    <p class="card-description">#Some Medicine#</p>
                </div>
            </div>

            <!-- card 4  -->
             <div class="course-card">

                    <p class="card-description">Active</p>

            </div>

    <footer class="footer">
